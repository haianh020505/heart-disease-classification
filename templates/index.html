<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dự đoán Bệnh Tim — Heart Disease Prediction</title>
    <meta name="description" content="Ứng dụng dự đoán nguy cơ mắc bệnh tim dựa trên dữ liệu sức khỏe cá nhân sử dụng Machine Learning." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        /* ============================================
           CSS Reset & Variables
           ============================================ */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --bg-card: rgba(17, 24, 39, 0.65);
            --bg-card-hover: rgba(24, 34, 56, 0.75);
            --border-glass: rgba(255, 255, 255, 0.08);
            --border-glow: rgba(99, 102, 241, 0.3);

            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --text-label: #cbd5e1;

            --accent-indigo: #6366f1;
            --accent-indigo-light: #818cf8;
            --accent-purple: #a78bfa;
            --accent-cyan: #22d3ee;

            --success: #10b981;
            --success-bg: rgba(16, 185, 129, 0.1);
            --success-border: rgba(16, 185, 129, 0.3);

            --danger: #ef4444;
            --danger-bg: rgba(239, 68, 68, 0.1);
            --danger-border: rgba(239, 68, 68, 0.3);

            --warning-bg: rgba(251, 191, 36, 0.08);
            --warning-border: rgba(251, 191, 36, 0.25);
            --warning-text: #fbbf24;

            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;

            --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.3), 0 0 0 1px var(--border-glass);
            --shadow-glow: 0 0 30px rgba(99, 102, 241, 0.15);

            --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-smooth: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-spring: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* ============================================
           Background Effects
           ============================================ */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background:
                radial-gradient(ellipse 80% 50% at 20% 20%, rgba(99, 102, 241, 0.12) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 80%, rgba(167, 139, 250, 0.1) 0%, transparent 60%),
                radial-gradient(ellipse 50% 30% at 50% 50%, rgba(34, 211, 238, 0.05) 0%, transparent 60%);
        }

        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        /* Floating orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 20s infinite ease-in-out;
            z-index: -1;
            pointer-events: none;
        }
        .orb-1 {
            width: 400px;
            height: 400px;
            background: rgba(99, 102, 241, 0.15);
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }
        .orb-2 {
            width: 300px;
            height: 300px;
            background: rgba(167, 139, 250, 0.12);
            bottom: -50px;
            right: -50px;
            animation-delay: -7s;
        }
        .orb-3 {
            width: 200px;
            height: 200px;
            background: rgba(34, 211, 238, 0.1);
            top: 50%;
            left: 50%;
            animation-delay: -14s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -40px) scale(1.05); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(15px, 35px) scale(1.02); }
        }

        /* ============================================
           Layout
           ============================================ */
        .container {
            max-width: 840px;
            margin: 0 auto;
            padding: 40px 20px 60px;
        }

        /* ============================================
           Header
           ============================================ */
        .header {
            text-align: center;
            margin-bottom: 48px;
            animation: fadeInDown 0.8s ease-out;
        }

        .header-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, var(--accent-indigo), var(--accent-purple));
            border-radius: 20px;
            margin-bottom: 20px;
            font-size: 32px;
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.3);
            animation: pulse-glow 3s infinite ease-in-out;
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 8px 24px rgba(99, 102, 241, 0.3); }
            50% { box-shadow: 0 8px 40px rgba(99, 102, 241, 0.5); }
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent-indigo-light) 50%, var(--accent-purple) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 1rem;
            font-weight: 400;
            max-width: 480px;
            margin: 0 auto;
        }

        /* ============================================
           Form Card (Glassmorphism)
           ============================================ */
        .form-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-xl);
            padding: 40px;
            box-shadow: var(--shadow-card);
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        /* ============================================
           Section Titles
           ============================================ */
        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-glass);
        }

        .section-title:not(:first-child) {
            margin-top: 36px;
        }

        .section-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.15), rgba(167, 139, 250, 0.1));
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: var(--radius-sm);
            font-size: 16px;
        }

        .section-title h2 {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.01em;
        }

        /* ============================================
           Form Grid
           ============================================ */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .form-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--text-label);
            letter-spacing: 0.01em;
        }

        .form-label .hint {
            font-weight: 400;
            color: var(--text-muted);
            font-size: 0.75rem;
        }

        .tooltip-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 16px;
            height: 16px;
            font-size: 10px;
            font-weight: 700;
            background: rgba(99, 102, 241, 0.15);
            color: var(--accent-indigo-light);
            border-radius: 50%;
            cursor: help;
            position: relative;
        }

        .tooltip-icon::after {
            content: attr(data-tip);
            position: absolute;
            bottom: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background: var(--bg-secondary);
            border: 1px solid var(--border-glass);
            color: var(--text-secondary);
            font-size: 0.72rem;
            font-weight: 400;
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            white-space: nowrap;
            max-width: 260px;
            white-space: normal;
            pointer-events: none;
            opacity: 0;
            transition: var(--transition-fast);
            z-index: 100;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
        }

        .tooltip-icon:hover::after {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }

        /* Input & Select base */
        .form-input,
        .form-select {
            width: 100%;
            height: 44px;
            padding: 0 14px;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 400;
            color: var(--text-primary);
            background: rgba(15, 23, 42, 0.6);
            border: 1.5px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--radius-sm);
            outline: none;
            transition: var(--transition-fast);
            -webkit-appearance: none;
            appearance: none;
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        .form-input:hover,
        .form-select:hover {
            border-color: rgba(255, 255, 255, 0.15);
            background: rgba(15, 23, 42, 0.8);
        }

        .form-input:focus,
        .form-select:focus {
            border-color: var(--accent-indigo);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12);
            background: rgba(15, 23, 42, 0.9);
        }

        .form-select {
            cursor: pointer;
            background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%2394a3b8' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 14px center;
            padding-right: 36px;
        }

        .form-select option {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        /* Invalid state */
        .form-input.invalid,
        .form-select.invalid {
            border-color: var(--danger);
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.12);
        }

        /* ============================================
           Submit Button
           ============================================ */
        .submit-wrapper {
            margin-top: 36px;
            display: flex;
            justify-content: center;
        }

        .btn-predict {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            min-width: 260px;
            height: 52px;
            padding: 0 32px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.01em;
            color: #fff;
            background: linear-gradient(135deg, var(--accent-indigo) 0%, #7c3aed 100%);
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: var(--transition-smooth);
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.3);
        }

        .btn-predict::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 60%);
            opacity: 0;
            transition: var(--transition-fast);
        }

        .btn-predict:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(99, 102, 241, 0.4);
        }

        .btn-predict:hover::before {
            opacity: 1;
        }

        .btn-predict:active {
            transform: translateY(0);
        }

        .btn-predict:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-predict .btn-icon {
            font-size: 18px;
            transition: var(--transition-fast);
        }

        /* Loading spinner */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2.5px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        .btn-predict.loading .spinner {
            display: block;
        }

        .btn-predict.loading .btn-text,
        .btn-predict.loading .btn-icon {
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ============================================
           Result Card
           ============================================ */
        .result-section {
            margin-top: 32px;
            animation: fadeInUp 0.6s var(--transition-spring) both;
        }

        .result-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--radius-xl);
            padding: 36px;
            box-shadow: var(--shadow-card);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .result-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: var(--radius-xl);
            padding: 1.5px;
            background: linear-gradient(135deg, transparent, rgba(99, 102, 241, 0.3), transparent);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .result-card.positive {
            border: 1px solid var(--danger-border);
            background: linear-gradient(135deg, var(--danger-bg), var(--bg-card));
        }

        .result-card.negative {
            border: 1px solid var(--success-border);
            background: linear-gradient(135deg, var(--success-bg), var(--bg-card));
        }

        .result-emoji {
            font-size: 56px;
            margin-bottom: 16px;
            animation: bounceIn 0.6s ease-out;
        }

        @keyframes bounceIn {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }

        .result-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .result-card.positive .result-title {
            color: var(--danger);
        }

        .result-card.negative .result-title {
            color: var(--success);
        }

        .result-message {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 28px;
        }

        /* Probability bar */
        .prob-wrapper {
            max-width: 400px;
            margin: 0 auto 12px;
        }

        .prob-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .prob-label {
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .prob-value {
            font-size: 1.1rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        .result-card.positive .prob-value { color: var(--danger); }
        .result-card.negative .prob-value { color: var(--success); }

        .prob-track {
            width: 100%;
            height: 10px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 5px;
            overflow: hidden;
        }

        .prob-bar {
            height: 100%;
            border-radius: 5px;
            transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            width: 0;
        }

        .result-card.positive .prob-bar {
            background: linear-gradient(90deg, #f87171, var(--danger));
        }

        .result-card.negative .prob-bar {
            background: linear-gradient(90deg, #34d399, var(--success));
        }

        /* Disclaimer */
        .disclaimer {
            margin-top: 24px;
            padding: 14px 18px;
            background: var(--warning-bg);
            border: 1px solid var(--warning-border);
            border-radius: var(--radius-md);
            display: flex;
            align-items: flex-start;
            gap: 10px;
            text-align: left;
        }

        .disclaimer-icon {
            font-size: 18px;
            flex-shrink: 0;
            margin-top: 1px;
        }

        .disclaimer p {
            font-size: 0.78rem;
            color: var(--warning-text);
            line-height: 1.5;
            opacity: 0.9;
        }

        /* Error toast */
        .error-toast {
            margin-top: 20px;
            padding: 14px 20px;
            background: var(--danger-bg);
            border: 1px solid var(--danger-border);
            border-radius: var(--radius-md);
            color: var(--danger);
            font-size: 0.88rem;
            font-weight: 500;
            text-align: center;
            animation: fadeInUp 0.4s ease-out;
        }

        /* ============================================
           Animations
           ============================================ */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Staggered animation for form groups */
        .form-group {
            animation: fadeInUp 0.5s ease-out both;
        }

        .form-card .form-group:nth-child(1) { animation-delay: 0.3s; }
        .form-card .form-group:nth-child(2) { animation-delay: 0.35s; }
        .form-card .form-group:nth-child(3) { animation-delay: 0.4s; }
        .form-card .form-group:nth-child(4) { animation-delay: 0.45s; }
        .form-card .form-group:nth-child(5) { animation-delay: 0.5s; }

        /* ============================================
           Footer
           ============================================ */
        .footer {
            text-align: center;
            padding: 40px 20px 20px;
            color: var(--text-muted);
            font-size: 0.78rem;
        }

        .footer a {
            color: var(--accent-indigo-light);
            text-decoration: none;
        }

        /* ============================================
           Responsive
           ============================================ */
        @media (max-width: 600px) {
            .container {
                padding: 24px 16px 40px;
            }

            .header h1 {
                font-size: 1.5rem;
            }

            .form-card {
                padding: 24px 20px;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .btn-predict {
                width: 100%;
            }

            .result-card {
                padding: 28px 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Background effects -->
    <div class="bg-gradient"></div>
    <div class="bg-grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <main class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-icon">❤️</div>
            <h1>Dự đoán Bệnh Tim</h1>
            <p>Nhập thông tin sức khỏe của bạn để đánh giá nguy cơ mắc bệnh tim bằng AI</p>
        </header>

        <!-- Form -->
        <form id="predict-form" class="form-card" autocomplete="off">

            <!-- Section 1: Personal Information -->
            <div class="section-title">
                <div class="section-icon">👤</div>
                <h2>Thông tin cá nhân</h2>
            </div>
            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label" for="age">
                        Tuổi
                        <span class="tooltip-icon" data-tip="Tuổi của bạn (1 – 120)">?</span>
                    </label>
                    <input class="form-input" type="number" id="age" name="age"
                           min="1" max="120" placeholder="VD: 52" required />
                </div>

                <div class="form-group">
                    <label class="form-label" for="sex">
                        Giới tính
                    </label>
                    <select class="form-select" id="sex" name="sex" required>
                        <option value="" disabled selected>— Chọn —</option>
                        <option value="0">Nữ</option>
                        <option value="1">Nam</option>
                    </select>
                </div>
            </div>

            <!-- Section 2: Cardiovascular -->
            <div class="section-title">
                <div class="section-icon">🫀</div>
                <h2>Thông số tim mạch</h2>
            </div>
            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label" for="chest_pain">
                        Loại đau ngực
                        <span class="tooltip-icon" data-tip="0: Typical Angina, 1: Atypical Angina, 2: Non-anginal Pain, 3: Asymptomatic">?</span>
                    </label>
                    <select class="form-select" id="chest_pain" name="chest_pain" required>
                        <option value="" disabled selected>— Chọn —</option>
                        <option value="0">Đau thắt ngực điển hình (Typical)</option>
                        <option value="1">Đau thắt ngực không điển hình (Atypical)</option>
                        <option value="2">Đau không do tim (Non-anginal)</option>
                        <option value="3">Không triệu chứng (Asymptomatic)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="restbps">
                        Huyết áp nghỉ <span class="hint">(mmHg)</span>
                        <span class="tooltip-icon" data-tip="Huyết áp tâm thu khi nghỉ ngơi (50 – 300 mmHg)">?</span>
                    </label>
                    <input class="form-input" type="number" id="restbps" name="restbps"
                           min="50" max="300" placeholder="VD: 125" required />
                </div>

                <div class="form-group">
                    <label class="form-label" for="thalach">
                        Nhịp tim tối đa <span class="hint">(bpm)</span>
                        <span class="tooltip-icon" data-tip="Nhịp tim tối đa đạt được khi tập luyện (40 – 250 bpm)">?</span>
                    </label>
                    <input class="form-input" type="number" id="thalach" name="thalach"
                           min="40" max="250" placeholder="VD: 168" required />
                </div>

                <div class="form-group">
                    <label class="form-label" for="exang">
                        Đau ngực khi tập
                        <span class="tooltip-icon" data-tip="Exercise-induced angina: cơn đau ngực xuất hiện khi gắng sức">?</span>
                    </label>
                    <select class="form-select" id="exang" name="exang" required>
                        <option value="" disabled selected>— Chọn —</option>
                        <option value="0">Không</option>
                        <option value="1">Có</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="oldpeak">
                        ST Depression (oldpeak)
                        <span class="tooltip-icon" data-tip="Mức chênh lệch ST trên ECG khi tập so với nghỉ (0.0 – 10.0)">?</span>
                    </label>
                    <input class="form-input" type="number" id="oldpeak" name="oldpeak"
                           min="0" max="10" step="0.1" placeholder="VD: 1.0" required />
                </div>

                <div class="form-group">
                    <label class="form-label" for="slope">
                        Slope ST Segment
                        <span class="tooltip-icon" data-tip="Độ dốc đoạn ST trên ECG: 0: Upsloping, 1: Flat, 2: Downsloping">?</span>
                    </label>
                    <select class="form-select" id="slope" name="slope" required>
                        <option value="" disabled selected>— Chọn —</option>
                        <option value="0">Dốc lên (Upsloping)</option>
                        <option value="1">Phẳng (Flat)</option>
                        <option value="2">Dốc xuống (Downsloping)</option>
                    </select>
                </div>
            </div>

            <!-- Section 3: Lab Results -->
            <div class="section-title">
                <div class="section-icon">🔬</div>
                <h2>Kết quả xét nghiệm</h2>
            </div>
            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label" for="chol">
                        Cholesterol <span class="hint">(mg/dl)</span>
                        <span class="tooltip-icon" data-tip="Nồng độ cholesterol toàn phần trong máu (50 – 800 mg/dl)">?</span>
                    </label>
                    <input class="form-input" type="number" id="chol" name="chol"
                           min="50" max="800" placeholder="VD: 212" required />
                </div>

                <div class="form-group">
                    <label class="form-label" for="fbs">
                        Đường huyết lúc đói > 120
                        <span class="tooltip-icon" data-tip="Fasting blood sugar > 120 mg/dl">?</span>
                    </label>
                    <select class="form-select" id="fbs" name="fbs" required>
                        <option value="" disabled selected>— Chọn —</option>
                        <option value="0">Không (≤ 120 mg/dl)</option>
                        <option value="1">Có (> 120 mg/dl)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="restecg">
                        Kết quả ECG nghỉ
                        <span class="tooltip-icon" data-tip="0: Bình thường, 1: Bất thường sóng ST-T, 2: Phì đại thất trái">?</span>
                    </label>
                    <select class="form-select" id="restecg" name="restecg" required>
                        <option value="" disabled selected>— Chọn —</option>
                        <option value="0">Bình thường</option>
                        <option value="1">Bất thường sóng ST-T</option>
                        <option value="2">Phì đại thất trái (LVH)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="ca">
                        Số mạch máu lớn (ca)
                        <span class="tooltip-icon" data-tip="Số mạch máu lớn nhuộm bằng fluoroscopy (0 – 4)">?</span>
                    </label>
                    <select class="form-select" id="ca" name="ca" required>
                        <option value="" disabled selected>— Chọn —</option>
                        <option value="0">0</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="thal">
                        Thalassemia
                        <span class="tooltip-icon" data-tip="0: Unknown, 1: Normal, 2: Fixed Defect, 3: Reversible Defect">?</span>
                    </label>
                    <select class="form-select" id="thal" name="thal" required>
                        <option value="" disabled selected>— Chọn —</option>
                        <option value="0">Không rõ</option>
                        <option value="1">Bình thường (Normal)</option>
                        <option value="2">Khuyết cố định (Fixed Defect)</option>
                        <option value="3">Khuyết đảo ngược (Reversible Defect)</option>
                    </select>
                </div>
            </div>

            <!-- Submit -->
            <div class="submit-wrapper">
                <button type="submit" class="btn-predict" id="btn-predict">
                    <span class="btn-icon">🔍</span>
                    <span class="btn-text">Dự đoán ngay</span>
                    <div class="spinner"></div>
                </button>
            </div>
        </form>

        <!-- Result (hidden initially) -->
        <div id="result-section"></div>
    </main>

    <footer class="footer">
        <p>Heart Disease Prediction — Powered by Machine Learning</p>
    </footer>

    <script>
        /* ============================================
           App Logic
           ============================================ */
        const form = document.getElementById('predict-form');
        const btnPredict = document.getElementById('btn-predict');
        const resultSection = document.getElementById('result-section');

        const FEATURE_FIELDS = [
            'age', 'sex', 'chest_pain', 'restbps', 'chol',
            'fbs', 'restecg', 'thalach', 'exang', 'oldpeak',
            'slope', 'ca', 'thal'
        ];

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Clear previous results
            resultSection.innerHTML = '';

            // Clear invalid states
            document.querySelectorAll('.invalid').forEach(el => el.classList.remove('invalid'));

            // Collect data
            const data = {};
            let hasError = false;

            for (const field of FEATURE_FIELDS) {
                const el = document.getElementById(field);
                const val = el.value.trim();

                if (val === '' || val === null) {
                    el.classList.add('invalid');
                    hasError = true;
                    continue;
                }

                data[field] = el.type === 'number' ? parseFloat(val) : parseInt(val, 10);
            }

            if (hasError) {
                resultSection.innerHTML = `
                    <div class="error-toast">⚠️ Vui lòng điền đầy đủ tất cả các trường.</div>
                `;
                return;
            }

            // Show loading
            btnPredict.classList.add('loading');
            btnPredict.disabled = true;

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.error || 'Có lỗi xảy ra');
                }

                renderResult(result);

            } catch (err) {
                resultSection.innerHTML = `
                    <div class="error-toast">❌ ${err.message}</div>
                `;
            } finally {
                btnPredict.classList.remove('loading');
                btnPredict.disabled = false;
            }
        });

        function renderResult(result) {
            const isPositive = result.prediction === 1;
            const probPercent = (result.probability * 100).toFixed(1);
            const cardClass = isPositive ? 'positive' : 'negative';
            const emoji = isPositive ? '⚠️' : '💚';
            const title = isPositive ? 'Có nguy cơ mắc bệnh tim' : 'Không có nguy cơ mắc bệnh tim';
            const subtitle = isPositive
                ? 'Dựa trên dữ liệu bạn cung cấp, mô hình AI đánh giá bạn có nguy cơ mắc bệnh tim. Hãy tham khảo ý kiến bác sĩ để được tư vấn chính xác.'
                : 'Dựa trên dữ liệu bạn cung cấp, mô hình AI đánh giá bạn không có nguy cơ mắc bệnh tim. Hãy tiếp tục duy trì lối sống lành mạnh!';

            resultSection.innerHTML = `
                <div class="result-section">
                    <div class="result-card ${cardClass}">
                        <div class="result-emoji">${emoji}</div>
                        <div class="result-title">${title}</div>
                        <div class="result-message">${subtitle}</div>
                        <div class="prob-wrapper">
                            <div class="prob-header">
                                <span class="prob-label">Xác suất mắc bệnh</span>
                                <span class="prob-value">${probPercent}%</span>
                            </div>
                            <div class="prob-track">
                                <div class="prob-bar" id="prob-bar"></div>
                            </div>
                        </div>
                        <div class="disclaimer">
                            <span class="disclaimer-icon">⚕️</span>
                            <p>Kết quả chỉ mang tính tham khảo dựa trên mô hình Machine Learning. 
                            Đây <strong>không phải</strong> chẩn đoán y khoa. Vui lòng đến cơ sở y tế 
                            để được khám và tư vấn bởi bác sĩ chuyên khoa.</p>
                        </div>
                    </div>
                </div>
            `;

            // Animate probability bar
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    const bar = document.getElementById('prob-bar');
                    if (bar) {
                        bar.style.width = probPercent + '%';
                    }
                });
            });

            // Smooth scroll to result
            resultSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        /* Interactive: remove invalid state on input */
        document.querySelectorAll('.form-input, .form-select').forEach(el => {
            el.addEventListener('input', () => el.classList.remove('invalid'));
            el.addEventListener('change', () => el.classList.remove('invalid'));
        });
    </script>
</body>
</html>
